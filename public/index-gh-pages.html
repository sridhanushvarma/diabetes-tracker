<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Diabetes Tracker</title>
  <base href="https://sridhanush-varma.github.io/Diabetes-Checker/">
  
  <!-- Fix asset paths before anything else loads -->
  <script src="https://sridhanush-varma.github.io/Diabetes-Checker/fix-asset-paths.js"></script>
  
  <!-- Redirect script for direct route access -->
  <script>
    (function() {
      // Only run on GitHub Pages
      if (window.location.hostname.indexOf('github.io') === -1) return;
      
      // Handle direct route access
      var routes = ['/auth', '/dashboard', '/import', '/records'];
      var path = window.location.pathname;
      var repoPath = '/Diabetes-Checker';
      
      // Check if we're accessing a route directly
      for (var i = 0; i < routes.length; i++) {
        if (path === repoPath + routes[i] || path === routes[i]) {
          // Redirect to the hash-based route
          window.location.replace('https://sridhanush-varma.github.io/Diabetes-Checker/#' + routes[i]);
          return;
        }
      }
      
      // Handle hash-based routing
      if (window.location.hash && window.location.hash.startsWith('#/')) {
        // Let the app handle it
        return;
      }
    })();
  </script>
  
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #f0f4f8;
      color: #333;
    }
    
    .dark-mode body {
      background-color: #1a202c;
      color: #f7fafc;
    }
    
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }
    
    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: #0ea5e9;
    }
    
    .dark-mode h1 {
      color: #38bdf8;
    }
    
    p {
      font-size: 1.2rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    
    .loader {
      border: 5px solid #f3f3f3;
      border-top: 5px solid #0ea5e9;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 0 auto 2rem;
    }
    
    .dark-mode .loader {
      border: 5px solid #2d3748;
      border-top: 5px solid #38bdf8;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .button {
      display: inline-block;
      background-color: #0ea5e9;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 0.375rem;
      text-decoration: none;
      font-weight: 600;
      transition: background-color 0.2s;
    }
    
    .button:hover {
      background-color: #0284c7;
    }
    
    .dark-mode .button {
      background-color: #38bdf8;
      color: #1a202c;
    }
    
    .dark-mode .button:hover {
      background-color: #0ea5e9;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Diabetes Tracker</h1>
    <div class="loader"></div>
    <p>Loading application...</p>
    <p>If the application doesn't load automatically, please click one of the links below:</p>
    <p>
      <a href="https://sridhanush-varma.github.io/Diabetes-Checker/" class="button">Home</a>
      <a href="https://sridhanush-varma.github.io/Diabetes-Checker/#/auth" class="button">Login</a>
    </p>
  </div>
  
  <script>
    // Check for dark mode preference
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.classList.add('dark-mode');
    }
    
    // Redirect to the app after a short delay
    setTimeout(function() {
      window.location.href = 'https://sridhanush-varma.github.io/Diabetes-Checker/';
    }, 2000);
  </script>
</body>
</html>
